---
# Mapping file for gen_packages_table.py
#
# aliases: maps any install-file package ID -> canonical display name.
#   Keys are exact IDs as they appear in install files (case-sensitive).
#   Values are the display names used in the Packages.md table.
#   Only needed when the ID is NOT the display name (i.e., ambiguous,
#   distro-specific variant, flatpak reverse-domain, winget publisher.app, etc.)
#
# static: packages that appear in the table but have NO entry in any install
#   file. These are managed outside the standard install pipeline.
#   Each entry must list all five distro columns explicitly.
aliases:
