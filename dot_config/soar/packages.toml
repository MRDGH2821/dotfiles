[defaults]
binary_only = false
profile = "default"

[packages.alejandra]
asset_pattern = "alejandra-{arch}-unknown-{os}-musl"
github = "kamadorueda/alejandra"
pkg_type = "static"
tag_pattern = "*.*.*"

[packages.btop]
asset_pattern = "btop-{arch}-unknown-{os}-musl.tbz"
github = "aristocratos/btop"
pkg_id = "aristocratos.btop"

[packages.direnv]
asset_pattern = "direnv.{os}-amd64"
github = "direnv/direnv"
pkg_id = "direnv.direnv"

[packages.dra]
asset_pattern = "dra-*-{arch}-unknown-{os}-gnu.tar.gz"
github = "devmatteini/dra"
pkg_type = "archive"
tag_pattern = "*.*.*"

[packages.engram]
asset_pattern = "engram_*_{os}_amd64.tar.gz"
github = "Gentleman-Programming/engram"
pkg_type = "archive"
version = "1.11.0"

[packages.fastfetch]
asset_pattern = "fastfetch-{os}-amd64.tar.gz"
extract_root = "fastfetch-{os}-amd64"
github = "fastfetch-cli/fastfetch"
pkg_type = "archive"
tag_pattern = "*.*.*"
version = "2.61.0"

[packages.fzf]
asset_pattern = "fzf-*-{os}_amd64.tar.gz"
github = "junegunn/fzf"
pkg_id = "junegunn.fzf"
version = "0.71.0"

[packages.git-sync]
asset_pattern = "git-sync_*_{os}_amd64.tar.gz"
github = "AkashRajpurohit/git-sync"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.lazygit]
asset_pattern = "lazygit_*_{os}_{arch}.tar.gz"
github = "jesseduffield/lazygit"
pkg_id = "jesseduffield.lazygit"
version = "0.61.0"

[packages.llmfit]
asset_pattern = "llmfit-*-{arch}-unknown-{os}-gnu.tar.gz"
github = "AlexsJones/llmfit"
pkg_type = "archive"
tag_pattern = "v*.*.*"
version = "0.8.9"

[packages.pince]
asset_pattern = "*.AppImage"
github = "korcankaraokcu/PINCE"
pkg_type = "appimage"
tag_pattern = "v*.*.*"

[packages.rclone]
asset_pattern = "rclone-*-{os}-amd64.zip"
github = "rclone/rclone"
pkg_id = "rclone.rclone"
version = "1.73.3"

[packages.rclone_browser]
asset_pattern = "*{os}-{arch}.AppImage"
github = "kapitainsky/RcloneBrowser"
pkg_type = "appimage"
tag_pattern = "*.*.*"

[packages.savestate]
asset_pattern = "*.AppImage"
github = "Matteo842/SaveState"
pkg_type = "appimage"
version = "2.6.b"

[packages.shellcheck]
asset_pattern = "shellcheck-*.{os}.{arch}.tar.gz"
github = "koalaman/shellcheck"
pkg_id = "koalaman.shellcheck"

[packages.shfmt]
asset_pattern = "shfmt_*_{os}_amd64"
github = "mvdan/sh"
pkg_id = "mvdan.shfmt"
version = "3.13.1"

[packages.treefmt]
asset_pattern = "treefmt_*_{os}_amd64.tar.gz"
github = "numtide/treefmt"
pkg_type = "archive"
tag_pattern = "v*.*.*"
version = "2.5.0"

[packages.use_via]
asset_pattern = "*{os}.AppImage"
github = "the-via/releases"
pkg_type = "appimage"
tag_pattern = "v*.*.*"

[packages.yq]
asset_pattern = "yq_{os}_amd64"
github = "mikefarah/yq"
pkg_id = "mikefarah.yq"
version = "4.52.5"
