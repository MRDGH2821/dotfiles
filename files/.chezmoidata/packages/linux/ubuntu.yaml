---
dra:
  package:
    - espanso/espanso --select espanso-debian-wayland-amd64.deb
    - Heroic-Games-Launcher/HeroicGamesLauncher --select Heroic-{tag}-linux-amd64.deb
flatpak:
  - io.github.alainm23.planify
  - io.github.radiolamp.mangojuice
  - org.onlyoffice.desktopeditors
installer_url:
  - if ! command -v docker >/dev/null 2>&1; then curl -fsSL https://get.docker.com | sudo sh; fi
kde:
  - syncthingtray-kde-plasma
laptop_only:
  dra:
    package:
      - TibixDev/winboat --select winboat-{tag}-amd64.deb
  nala:
    native:
      - obs-studio
nala:
  native:
    - apparmor-utils
    - bun
    - gh
    - gnupg2
    - libpam-u2f
    - libqt6core6
    - libqt6gui6
    - libqt6printsupport6
    - libqt6widgets6
    - meld
    - pamu2fcfg
    - sane-utils
    - syncthingtray
    - system-config-printer
  url:
    # - https://api.gitkraken.dev/releases/production/linux/x64/active/gitkraken-amd64.deb
    - https://cdn.akamai.steamstatic.com/client/installer/steam.deb
    - https://discord.com/api/download?platform=linux&format=deb
