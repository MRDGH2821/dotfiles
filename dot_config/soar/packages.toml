[defaults]
binary_only = false
profile = "default"

[packages.alejandra]
asset_pattern = "alejandra-{arch}-unknown-{os}-musl"
github = "kamadorueda/alejandra"
pkg_type = "static"
tag_pattern = "*.*.*"

[packages.bat]
asset_pattern = "*{arch}-unknown-{os}-musl.tar.gz"
github = "sharkdp/bat"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.btop]
asset_pattern = "btop-{arch}-unknown-{os}-musl.tbz"
github = "aristocratos/btop"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.bun]
asset_pattern = "bun-{os}-x64-musl.zip"
github = "oven-sh/bun"
pkg_type = "archive"
tag_pattern = "bun-v*.*.*"

[packages.direnv]
asset_pattern = "direnv.{os}-amd64"
github = "direnv/direnv"
pkg_type = "static"
tag_pattern = "v*.*.*"

[packages.dra]
asset_pattern = "*{arch}-unknown-{os}-gnu.tar.gz"
github = "devmatteini/dra"
pkg_type = "archive"
tag_pattern = "*.*.*"

[packages.fastfetch]
asset_pattern = "fastfetch-{os}-amd64.tar.gz"
github = "fastfetch-cli/fastfetch"
pkg_type = "archive"
tag_pattern = "*.*.*"

[packages.fzf]
asset_pattern = "*{os}_amd64.tar.gz"
github = "junegunn/fzf"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.gh]
asset_pattern = "gh_*_{os}_amd64.tar.gz"
github = "cli/cli"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.lazygit]
asset_pattern = "*{os}_{arch}.tar.gz"
github = "jesseduffield/lazygit"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.ludusavi]
asset_pattern = "*{os}.tar.gz"
github = "mtkennerly/ludusavi"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.mcfly]
asset_pattern = "*{arch}-unknown-{os}-musl.tar.gz"
github = "cantino/mcfly"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.pcloud]
pkg_type = "appimage"
repo = "ivan-hc-am"

[packages.pince]
asset_pattern = "*.AppImage"
github = "korcankaraokcu/PINCE"
pkg_type = "appimage"
tag_pattern = "v*.*.*"

[packages.rclone]
asset_pattern = "rclone-*-{os}-amd64.zip"
github = "rclone/rclone"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.rclone_browser]
asset_pattern = "*{os}-{arch}.AppImage"
github = "kapitainsky/RcloneBrowser"
pkg_type = "appimage"
tag_pattern = "*.*.*"

[packages.savestate]
asset_pattern = "*.AppImage"
github = "Matteo842/SaveState"
pkg_type = "appimage"

[packages.shellcheck]
asset_pattern = "*{os}.{arch}.tar.xz"
github = "koalaman/shellcheck"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.shfmt]
asset_pattern = "shfmt_*_{os}_amd64"
github = "mvdan/sh"
pkg_type = "static"
tag_pattern = "v*.*.*"

[packages.tldr]
pkg_id = "github.com.tealdeer-rs.tealdeer"
pkg_type = "static"
repo = "bincache"

[packages.topgrade]
asset_pattern = "*{arch}-unknown-{os}-musl.tar.gz"
github = "topgrade-rs/topgrade"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.treefmt]
asset_pattern = "*{os}_amd64.tar.gz"
github = "numtide/treefmt"
pkg_type = "archive"
tag_pattern = "v*.*.*"

[packages.use_via]
asset_pattern = "*{os}.AppImage"
github = "the-via/releases"
pkg_type = "appimage"
tag_pattern = "v*.*.*"

[packages.uv]
asset_pattern = "uv-{arch}-unknown-{os}-musl.tar.gz"
github = "astral-sh/uv"
pkg_type = "archive"
tag_pattern = "*.*.*"

[packages.yq]
asset_pattern = "yq_{os}_amd64"
github = "mikefarah/yq"
pkg_type = "static"
tag_pattern = "v*.*.*"

[packages.zoxide]
asset_pattern = "zoxide-*-{arch}-unknown-{os}-musl.tar.gz"
github = "ajeetdsouza/zoxide"
pkg_type = "archive"
tag_pattern = "v*.*.*"
